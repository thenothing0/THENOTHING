<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYDRA Dashboard — Autonomous Security Swarm</title>
    <style>
        :root {
            --bg: #0a0e17; --surface: #111827; --border: #1f2937;
            --text: #e5e7eb; --muted: #9ca3af; --accent: #10b981;
            --accent2: #6366f1; --danger: #ef4444; --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem;
        }
        header h1 { font-size: 1.5rem; }
        header h1 span { color: var(--accent); }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        main { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1.5rem; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem;
        }
        .card h2 { font-size: 1rem; color: var(--muted); margin-bottom: 1rem; }
        .metric { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
        .findings-list { list-style: none; }
        .findings-list li {
            padding: 0.75rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between;
        }
        .severity {
            padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600;
        }
        .severity.critical { background: #7f1d1d; color: #fca5a5; }
        .severity.high { background: #78350f; color: #fbbf24; }
        .severity.medium { background: #1e3a5f; color: #93c5fd; }
        .severity.low { background: #064e3b; color: #6ee7b7; }
        #log { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
               max-height: 300px; overflow-y: auto; color: var(--muted); }
        #log div { padding: 2px 0; border-bottom: 1px solid var(--border); }
        footer { text-align: center; padding: 1rem; color: var(--muted); font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="status-dot"></div>
        <h1>🐉 <span>HYDRA</span> Dashboard</h1>
        <span style="color:var(--muted);margin-left:auto;">v3.0 — Autonomous Security Swarm</span>
    </header>
    <main>
        <div class="card">
            <h2>📊 Scan Status</h2>
            <div class="metric" id="scan-status">Idle</div>
            <p style="color:var(--muted);margin-top:0.5rem;" id="scan-target">No active scan</p>
        </div>
        <div class="card">
            <h2>🎯 Findings</h2>
            <div class="metric" id="finding-count">0</div>
            <p style="color:var(--muted);margin-top:0.5rem;">validated findings</p>
        </div>
        <div class="card" style="grid-column: span 2;">
            <h2>📋 Recent Findings</h2>
            <ul class="findings-list" id="findings"></ul>
        </div>
        <div class="card" style="grid-column: span 2;">
            <h2>📝 Live Log</h2>
            <div id="log"></div>
        </div>
    </main>
    <footer>HYDRA v3.0 — Autonomous Security Swarm Platform</footer>
    <script>
        const ws = new WebSocket(`ws://${location.host}/ws`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'finding') {
                const li = document.createElement('li');
                li.innerHTML = `<span>${data.name}</span><span class="severity ${data.severity}">${data.severity}</span>`;
                document.getElementById('findings').prepend(li);
                document.getElementById('finding-count').textContent =
                    document.getElementById('findings').children.length;
            }
            if (data.type === 'log') {
                const div = document.createElement('div');
                div.textContent = `[${new Date().toLocaleTimeString()}] ${data.message}`;
                document.getElementById('log').prepend(div);
            }
            if (data.type === 'status') {
                document.getElementById('scan-status').textContent = data.status || 'Running';
                document.getElementById('scan-target').textContent = data.target || '';
            }
        };
        // Poll status every 5s
        setInterval(async () => {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                document.getElementById('scan-status').textContent = d.status || 'Idle';
            } catch(e) {}
        }, 5000);
    </script>
</body>
</html>
