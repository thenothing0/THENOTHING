# ════════════════════════════════════════════════
#  HYDRA v2.0 — Kubernetes Deployment Manifests
#  Production-grade cluster deployment
# ════════════════════════════════════════════════

---
apiVersion: v1
kind: Namespace
metadata:
  name: hydra
  labels:
    app: hydra

---
# ── Redis Deployment ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: hydra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hydra-redis
  template:
    metadata:
      labels:
        app: hydra-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes", "--maxmemory", "1gb"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: hydra
spec:
  selector:
    app: hydra-redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ── Coordinator Deployment ────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: hydra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hydra-coordinator
  template:
    metadata:
      labels:
        app: hydra-coordinator
    spec:
      containers:
        - name: coordinator
          image: hydra:latest
          env:
            - name: REDIS_HOST
              value: redis
            - name: HYDRA_NODE_ROLE
              value: coordinator
            - name: HYDRA_DISTRIBUTED
              value: "true"
            - name: HYDRA_QUEUE_MODE
              value: distributed
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hydra-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hydra-secrets
                  key: anthropic-api-key
                  optional: true
          ports:
            - containerPort: 8080
              name: dashboard
            - containerPort: 8900
              name: mcp
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
  namespace: hydra
spec:
  selector:
    app: hydra-coordinator
  ports:
    - name: dashboard
      port: 8080
      targetPort: 8080
    - name: mcp
      port: 8900
      targetPort: 8900

---
# ── Worker Deployment (Horizontal Autoscaling) ─
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: hydra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hydra-worker
  template:
    metadata:
      labels:
        app: hydra-worker
    spec:
      containers:
        - name: worker
          image: hydra:latest
          env:
            - name: REDIS_HOST
              value: redis
            - name: HYDRA_NODE_ROLE
              value: worker
            - name: HYDRA_DISTRIBUTED
              value: "true"
            - name: HYDRA_QUEUE_MODE
              value: distributed
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hydra-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hydra-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

---
# ── Horizontal Pod Autoscaler ─────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: hydra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── Persistent Volume Claims ─────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: hydra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ── Secrets ──────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: hydra-secrets
  namespace: hydra
type: Opaque
data:
  # base64 encoded — replace with actual values
  openai-api-key: ""
  anthropic-api-key: ""
  shodan-api-key: ""
