global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'hydra-coordinator'
    static_configs:
      - targets: ['coordinator:8080']
    metrics_path: '/api/metrics/prometheus'
    scrape_interval: 10s

  - job_name: 'hydra-workers'
    static_configs:
      - targets: ['worker:8080']
    metrics_path: '/api/metrics/prometheus'
    scrape_interval: 15s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
